  <path d="M501 364 C560 364 580 420 658 420" stroke="#34d399" stroke-width="2.5" stroke-dasharray="7,4" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="580" y="404" text-anchor="middle" fill="#34d399" font-size="9.5" font-weight="600">pg driver  ·  SQL + pgvector</text>

