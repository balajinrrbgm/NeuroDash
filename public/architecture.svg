  <text x="913" y="147" text-anchor="middle" fill="#fbbf24" font-size="9.5">Provisioned via AWS CloudFormation IaC</text>

  <!-- ── BEDROCK inner box ── -->
  <rect x="680" y="160" width="466" height="148" rx="10" fill="#1a1200" stroke="#fbbf24" stroke-width="1.5"/>
  <!-- Bedrock logo placeholder -->
  <rect x="695" y="172" width="38" height="38" rx="6" fill="#fbbf24" opacity="0.15"/>
  <text x="714" y="196" text-anchor="middle" fill="#fbbf24" font-size="18">&#129302;</text>

  <text x="913" y="186" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700" letter-spacing="1.5">AWS BEDROCK</text>
  <text x="913" y="208" text-anchor="middle" fill="#f5f5f5" font-size="14" font-weight="700">Titan Text Embeddings v1</text>
  <text x="913" y="228" text-anchor="middle" fill="#a3a3a3" font-size="10">Model ID:  amazon.titan-embed-text-v1</text>
  <text x="913" y="246" text-anchor="middle" fill="#a3a3a3" font-size="10">Output:  1536-dimensional float[] per input</text>
  <text x="913" y="264" text-anchor="middle" fill="#fbbf24" font-size="9" font-style="italic">Pure JavaScript SDK  ·  IAM-authenticated  ·  No native binaries</text>
  <!-- Bedrock region badge -->
  <rect x="810" y="276" width="206" height="20" rx="4" fill="#1a1500" stroke="#f59e0b" stroke-width="1"/>
  <text x="913" y="289" text-anchor="middle" fill="#f59e0b" font-size="8.5" font-weight="600">@aws-sdk/client-bedrock-runtime  ^3.1075.0</text>

  <!-- ── AURORA inner box ── -->
  <rect x="680" y="328" width="466" height="242" rx="10" fill="#001a08" stroke="#34d399" stroke-width="1.5"/>
  <!-- Aurora logo placeholder -->
  <rect x="695" y="340" width="38" height="38" rx="6" fill="#34d399" opacity="0.15"/>
  <text x="714" y="364" text-anchor="middle" fill="#34d399" font-size="18">&#128451;</text>

  <text x="913" y="356" text-anchor="middle" fill="#34d399" font-size="11" font-weight="700" letter-spacing="1">AMAZON AURORA POSTGRESQL</text>
  <text x="913" y="378" text-anchor="middle" fill="#f5f5f5" font-size="14" font-weight="700">Serverless v2  ·  v15.17</text>
  <text x="913" y="398" text-anchor="middle" fill="#a3a3a3" font-size="10">Auto-scaling:  0.5 – 16 ACU  ·  Multi-AZ  ·  eu-central-1</text>

  <!-- pgvector badge -->
  <rect x="793" y="410" width="240" height="24" rx="6" fill="#0a2a14" stroke="#34d399" stroke-width="1.5" filter="url(#glow)"/>
  <text x="913" y="426" text-anchor="middle" fill="#34d399" font-size="10" font-weight="700">pgvector EXTENSION ENABLED</text>

  <!-- Schema info -->
  <rect x="693" y="448" width="200" height="48" rx="7" fill="#0d1a0d" stroke="#262626" stroke-width="1"/>
  <text x="793" y="465" text-anchor="middle" fill="#f5f5f5" font-size="9.5" font-weight="600">feedback_items</text>
  <text x="793" y="480" text-anchor="middle" fill="#a3a3a3" font-size="8.5">id, content, source_id</text>
  <text x="793" y="492" text-anchor="middle" fill="#a5b4fc" font-size="8.5">embedding  vector(1536)</text>

  <rect x="908" y="448" width="225" height="48" rx="7" fill="#0d1a0d" stroke="#262626" stroke-width="1"/>
  <text x="1020" y="465" text-anchor="middle" fill="#f5f5f5" font-size="9.5" font-weight="600">Cosine Similarity Query</text>
  <text x="1020" y="481" text-anchor="middle" fill="#a5b4fc" font-size="8.5">ORDER BY embedding &lt;=&gt; $vec</text>
  <text x="1020" y="493" text-anchor="middle" fill="#a3a3a3" font-size="8.5">LIMIT 10  — sub-second results</text>

  <!-- Infrastructure labels -->
  <rect x="693" y="510" width="200" height="22" rx="5" fill="#1a1400" stroke="#f59e0b" stroke-width="1"/>
  <text x="793" y="524" text-anchor="middle" fill="#f59e0b" font-size="8.5" font-weight="600">CloudFormation  ·  VPC  ·  Subnets</text>

  <rect x="908" y="510" width="225" height="22" rx="5" fill="#001520" stroke="#38bdf8" stroke-width="1"/>
  <text x="1020" y="524" text-anchor="middle" fill="#38bdf8" font-size="8.5" font-weight="600">IAM Roles  ·  Security Groups</text>

  <text x="913" y="555" text-anchor="middle" fill="#404040" font-size="9">neurodash-aurora-auroracluster.cluster-cz4g8km4yb4y.eu-central-1.rds.amazonaws.com</text>

