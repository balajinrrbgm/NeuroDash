<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="680" viewBox="0 0 1200 680" xmlns="http://www.w3.org/2000/svg"
     font-family="'Segoe UI', system-ui, Arial, sans-serif">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
    <marker id="arrowYellow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ═══════════════════════ BACKGROUND ═══════════════════════ -->
  <rect width="1200" height="680" fill="#0a0a0a"/>
  <!-- Subtle blobs -->
  <circle cx="900" cy="100" r="280" fill="#6366f1" opacity="0.05"/>
  <circle cx="200" cy="550" r="220" fill="#a855f7" opacity="0.05"/>

  <!-- ═══════════════════════ TITLE ═══════════════════════ -->
  <text x="600" y="46" text-anchor="middle" fill="url(#titleGrad)" font-size="26" font-weight="800" letter-spacing="-0.5">NeuroDash — System Architecture</text>
  <text x="600" y="68" text-anchor="middle" fill="#6366f1" font-size="11" font-weight="600" letter-spacing="2.5">H0: HACK THE ZERO STACK  ·  AWS + VERCEL  ·  2026</text>

  <!-- ─────────────── Divider line ─────────────── -->
  <line x1="60" y1="82" x2="1140" y2="82" stroke="#262626" stroke-width="1"/>

  <!-- ═══════════════════════ USER / BROWSER ═══════════════════════ -->
  <rect x="28" y="255" width="130" height="120" rx="12" fill="#171717" stroke="#404040" stroke-width="1.5"/>
  <!-- Browser icon -->
  <rect x="50" y="270" width="86" height="58" rx="6" fill="#262626" stroke="#404040" stroke-width="1"/>
  <rect x="50" y="270" width="86" height="14" rx="6" fill="#404040"/>
  <circle cx="60" cy="277" r="3" fill="#f43f5e" opacity="0.7"/>
  <circle cx="70" cy="277" r="3" fill="#fbbf24" opacity="0.7"/>
  <circle cx="80" cy="277" r="3" fill="#34d399" opacity="0.7"/>
  <text x="93" y="302" text-anchor="middle" fill="#a3a3a3" font-size="9">neuro-dash.vercel.app</text>
  <text x="93" y="348" text-anchor="middle" fill="#f5f5f5" font-size="12" font-weight="700">Browser</text>
  <text x="93" y="364" text-anchor="middle" fill="#a3a3a3" font-size="9">User / Client</text>

  <!-- Arrow: Browser → Vercel -->
  <line x1="158" y1="315" x2="228" y2="315" stroke="#6366f1" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="193" y="306" text-anchor="middle" fill="#6366f1" font-size="9.5" font-weight="600">HTTPS</text>

  <!-- ═══════════════════════ VERCEL PLATFORM ═══════════════════════ -->
  <rect x="233" y="108" width="268" height="440" rx="14" fill="#0d0d22" stroke="#6366f1" stroke-width="2"/>
  <!-- Header -->
  <rect x="233" y="108" width="268" height="36" rx="14" fill="#6366f1"/>
  <rect x="233" y="128" width="268" height="16" fill="#6366f1"/>
  <text x="367" y="131" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700" letter-spacing="1">▲  VERCEL PLATFORM</text>
  <text x="367" y="154" text-anchor="middle" fill="#818cf8" font-size="9.5">Edge Network + Serverless Functions</text>

  <!-- Next.js Dashboard sub-box -->
  <rect x="249" y="165" width="236" height="80" rx="9" fill="#171717" stroke="#a855f7" stroke-width="1.5"/>
  <text x="367" y="185" text-anchor="middle" fill="#a855f7" font-size="9.5" font-weight="700" letter-spacing="1">NEXT.JS 16  APP ROUTER</text>
  <text x="367" y="204" text-anchor="middle" fill="#f5f5f5" font-size="12.5" font-weight="700">NeuroDash Dashboard</text>
  <text x="367" y="220" text-anchor="middle" fill="#a3a3a3" font-size="9">Tailwind CSS v4  ·  Recharts  ·  TypeScript</text>
  <text x="367" y="235" text-anchor="middle" fill="#a3a3a3" font-size="9">Deployed on Vercel Edge CDN</text>

  <!-- /api/ingest sub-box -->
  <rect x="249" y="260" width="236" height="60" rx="9" fill="#0a2a14" stroke="#34d399" stroke-width="1.5"/>
  <text x="367" y="280" text-anchor="middle" fill="#34d399" font-size="11" font-weight="700">POST  /api/ingest</text>
  <text x="367" y="297" text-anchor="middle" fill="#a3a3a3" font-size="9">Generate embedding → store in Aurora</text>
  <text x="367" y="312" text-anchor="middle" fill="#404040" font-size="8.5">Vercel Serverless Function</text>

  <!-- /api/search sub-box -->
  <rect x="249" y="334" width="236" height="60" rx="9" fill="#0a2a14" stroke="#34d399" stroke-width="1.5"/>
  <text x="367" y="354" text-anchor="middle" fill="#34d399" font-size="11" font-weight="700">POST  /api/search</text>
  <text x="367" y="371" text-anchor="middle" fill="#a3a3a3" font-size="9">Embed query → cosine similarity search</text>
  <text x="367" y="386" text-anchor="middle" fill="#404040" font-size="8.5">Vercel Serverless Function</text>

  <!-- Drizzle ORM strip -->
  <rect x="249" y="408" width="236" height="34" rx="7" fill="#171717" stroke="#404040" stroke-width="1"/>
  <text x="367" y="425" text-anchor="middle" fill="#f5f5f5" font-size="10" font-weight="600">Drizzle ORM</text>
  <text x="367" y="438" text-anchor="middle" fill="#a3a3a3" font-size="8.5">Type-safe schema  ·  vector(1536) column type</text>

  <!-- IAM strip -->
  <rect x="249" y="456" width="236" height="34" rx="7" fill="#171717" stroke="#404040" stroke-width="1"/>
  <text x="367" y="472" text-anchor="middle" fill="#f5f5f5" font-size="10" font-weight="600">IAM Credentials</text>
  <text x="367" y="485" text-anchor="middle" fill="#a3a3a3" font-size="8.5">Least-privilege  ·  bedrock:InvokeModel only</text>

  <!-- Port label at bottom -->
  <text x="367" y="534" text-anchor="middle" fill="#404040" font-size="9">neuro-dash.vercel.app</text>

  <!-- ═══════════════════════ ARROWS: Vercel → AWS ═══════════════════════ -->
  <!-- To Bedrock -->
  <path d="M501 290 C560 290 580 248 658 248" stroke="#fbbf24" stroke-width="2.5" stroke-dasharray="7,4" fill="none" marker-end="url(#arrowYellow)"/>
  <text x="580" y="266" text-anchor="middle" fill="#fbbf24" font-size="9.5" font-weight="600">AWS SDK  ·  InvokeModel</text>

